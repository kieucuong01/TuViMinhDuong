<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Minh họa so sánh lá số bát tự và lá số tử vi theo dữ liệu đầu vào, câu hỏi đọc và hướng bắt đầu cho người mới">
