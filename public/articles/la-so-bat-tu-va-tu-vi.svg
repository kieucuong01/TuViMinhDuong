    <text x="116" y="198" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#214231">Bát tự và tử vi</text>
    <text x="116" y="236" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#7b5836">Hiểu đúng hệ trước khi đọc sâu</text>
    <rect x="116" y="282" width="388" height="72" rx="22" fill="#f3e6d1"/>
    <rect x="116" y="374" width="388" height="72" rx="22" fill="#fff7ec"/>
    <rect x="116" y="466" width="388" height="72" rx="22" fill="#f3e6d1"/>
    <circle cx="154" cy="318" r="12" fill="#c78649"/>
    <circle cx="154" cy="410" r="12" fill="#c78649"/>
    <circle cx="154" cy="502" r="12" fill="#c78649"/>
    <text x="184" y="312" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#214231">1. Xác định câu hỏi thật</text>
    <text x="184" y="338" font-family="Arial, sans-serif" font-size="18" fill="#4d3a27">Đọc khí chất hoặc từng mảng đời sống</text>
    <text x="184" y="404" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#214231">2. Kiểm tra dữ liệu đầu vào</text>
    <text x="184" y="430" font-family="Arial, sans-serif" font-size="18" fill="#4d3a27">Ngày sinh, giờ sinh, loại lịch phải đủ chắc</text>
    <text x="184" y="496" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#214231">3. Chọn đúng hệ để bắt đầu</text>
