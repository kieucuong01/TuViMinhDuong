name: SEO quality audit

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * 0"

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse SEO regression audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.15.x autorun --config=./lighthouserc.cjs

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-seo-quality
          path: .lighthouseci
          if-no-files-found: ignore
